services:
  datalens-mcp:
    build: .
    network_mode: bridge
    env_file:
      - .env
    ports:
      - "127.0.0.1:8096:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('localhost', 8000), timeout=5).close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
